# docker-compose.lab.yml
# ──────────────────────
# Uso no laboratório com 2 PCs físicos:
#
#   PC2 (servidor) — roda: servidor + atuador + sensores gen2 a gen9
#     1. Descubra o IP do PC2: ip addr show | grep "inet " | grep -v 127
#     2. Edite o .env: SERVER_HOST=<IP do PC2>
#     3. docker compose -f docker-compose.lab.yml --profile servidor up --build
#
#   PC1 (sensor remoto) — roda: só sensor_gen1, aponta para PC2
#     1. Copie o mesmo .env do PC2 para este PC
#     2. docker compose -f docker-compose.lab.yml --profile sensor up --build
#     3. Rode a GUI: python main_gui.py

networks:
  shiny_net:
    driver: bridge

services:

  # ── PC2 ──────────────────────────────────────────────────────────────────

  servidor:
    profiles: [servidor]
    build:
      context: .
      dockerfile: docker/Dockerfile.servidor
    container_name: shiny_servidor
    networks:
      - shiny_net
    ports:
      - "${UDP_PORT:-5000}:${UDP_PORT:-5000}/udp"
      - "${TCP_PORT:-6000}:${TCP_PORT:-6000}/tcp"
    environment:
      BIND_HOST: "0.0.0.0"
      UDP_PORT: "${UDP_PORT:-5000}"
      TCP_PORT: "${TCP_PORT:-6000}"
    restart: unless-stopped

  atuador:
    profiles: [servidor]
    build:
      context: .
      dockerfile: docker/Dockerfile.atuador
    container_name: shiny_atuador
    networks:
      - shiny_net
    environment:
      SERVER_HOST: "servidor"
      TCP_PORT: "${TCP_PORT:-6000}"
    depends_on:
      - servidor
    restart: unless-stopped

  sensor_gen2:
    profiles: [servidor]
    build:
      context: .
      dockerfile: docker/Dockerfile.sensor
    container_name: shiny_sensor_gen2
    networks:
      - shiny_net
    environment:
      SERVER_HOST: "servidor"
      UDP_SERVER_PORT: "${UDP_PORT:-5000}"
      GEN: "2"
    depends_on:
      - servidor
    restart: unless-stopped

  sensor_gen3:
    profiles: [servidor]
    build:
      context: .
      dockerfile: docker/Dockerfile.sensor
    container_name: shiny_sensor_gen3
    networks:
      - shiny_net
    environment:
      SERVER_HOST: "servidor"
      UDP_SERVER_PORT: "${UDP_PORT:-5000}"
      GEN: "3"
    depends_on:
      - servidor
    restart: unless-stopped

  sensor_gen4:
    profiles: [servidor]
    build:
      context: .
      dockerfile: docker/Dockerfile.sensor
    container_name: shiny_sensor_gen4
    networks:
      - shiny_net
    environment:
      SERVER_HOST: "servidor"
      UDP_SERVER_PORT: "${UDP_PORT:-5000}"
      GEN: "4"
    depends_on:
      - servidor
    restart: unless-stopped

  sensor_gen5:
    profiles: [servidor]
    build:
      context: .
      dockerfile: docker/Dockerfile.sensor
    container_name: shiny_sensor_gen5
    networks:
      - shiny_net
    environment:
      SERVER_HOST: "servidor"
      UDP_SERVER_PORT: "${UDP_PORT:-5000}"
      GEN: "5"
    depends_on:
      - servidor
    restart: unless-stopped

  sensor_gen6:
    profiles: [servidor]
    build:
      context: .
      dockerfile: docker/Dockerfile.sensor
    container_name: shiny_sensor_gen6
    networks:
      - shiny_net
    environment:
      SERVER_HOST: "servidor"
      UDP_SERVER_PORT: "${UDP_PORT:-5000}"
      GEN: "6"
    depends_on:
      - servidor
    restart: unless-stopped

  sensor_gen7:
    profiles: [servidor]
    build:
      context: .
      dockerfile: docker/Dockerfile.sensor
    container_name: shiny_sensor_gen7
    networks:
      - shiny_net
    environment:
      SERVER_HOST: "servidor"
      UDP_SERVER_PORT: "${UDP_PORT:-5000}"
      GEN: "7"
    depends_on:
      - servidor
    restart: unless-stopped

  sensor_gen8:
    profiles: [servidor]
    build:
      context: .
      dockerfile: docker/Dockerfile.sensor
    container_name: shiny_sensor_gen8
    networks:
      - shiny_net
    environment:
      SERVER_HOST: "servidor"
      UDP_SERVER_PORT: "${UDP_PORT:-5000}"
      GEN: "8"
    depends_on:
      - servidor
    restart: unless-stopped

  sensor_gen9:
    profiles: [servidor]
    build:
      context: .
      dockerfile: docker/Dockerfile.sensor
    container_name: shiny_sensor_gen9
    networks:
      - shiny_net
    environment:
      SERVER_HOST: "servidor"
      UDP_SERVER_PORT: "${UDP_PORT:-5000}"
      GEN: "9"
    depends_on:
      - servidor
    restart: unless-stopped

  # ── PC1 ──────────────────────────────────────────────────────────────────

  sensor_gen1:
    profiles: [sensor]
    build:
      context: .
      dockerfile: docker/Dockerfile.sensor
    container_name: shiny_sensor_gen1
    network_mode: host
    environment:
      SERVER_HOST: "${SERVER_HOST:-localhost}"
      UDP_SERVER_PORT: "${UDP_PORT:-5000}"
      GEN: "1"
    restart: unless-stopped
