# docker-compose.yml
# ──────────────────
# Lê configurações do arquivo .env na mesma pasta.
# Copie .env.example para .env e ajuste SERVER_HOST antes de subir.

networks:
  shiny_net:
    driver: bridge

services:

  # ── SERVIDOR ──────────────────────────────────────────────────────────────
  servidor:
    build:
      context: .
      dockerfile: docker/Dockerfile.servidor
    container_name: shiny_servidor
    networks:
      - shiny_net
    ports:
      - "${UDP_PORT:-5000}:${UDP_PORT:-5000}/udp"
      - "${TCP_PORT:-6000}:${TCP_PORT:-6000}/tcp"
    environment:
      BIND_HOST: "0.0.0.0"
      UDP_PORT: "${UDP_PORT:-5000}"
      TCP_PORT: "${TCP_PORT:-6000}"
    restart: unless-stopped

  # ── ATUADOR ───────────────────────────────────────────────────────────────
  atuador:
    build:
      context: .
      dockerfile: docker/Dockerfile.atuador
    container_name: shiny_atuador
    networks:
      - shiny_net
    environment:
      SERVER_HOST: "servidor"
      TCP_PORT: "${TCP_PORT:-6000}"
      ARQUIVO: "/shinies.json"
    volumes:
      - ./shinies.json:/data/shinies.json
    depends_on:
      - servidor
    restart: unless-stopped

  # ── SENSORES ──────────────────────────────────────────────────────────────
  sensor_gen1:
    build:
      context: .
      dockerfile: docker/Dockerfile.sensor
    container_name: shiny_sensor_gen1
    networks:
      - shiny_net
    environment:
      SERVER_HOST: "servidor"
      UDP_SERVER_PORT: "${UDP_PORT:-5000}"
      GEN: "1"
    depends_on:
      - servidor
    restart: unless-stopped

  sensor_gen2:
    build:
      context: .
      dockerfile: docker/Dockerfile.sensor
    container_name: shiny_sensor_gen2
    networks:
      - shiny_net
